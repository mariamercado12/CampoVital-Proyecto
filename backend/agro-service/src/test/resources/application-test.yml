# ==============================================================================
# AgroSmart Magdalena — Configuración de Tests
# ==============================================================================

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  servlet:
    context-path: /api

app:
  jwt:
    secret: testSecretKeyForUnitTestingPurposesOnly1234567890abc
    expiration-ms: 3600000

logging:
  level:
    com.agrosmart.magdalena: DEBUG
